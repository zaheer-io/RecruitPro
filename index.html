<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Recruitment Dashboard</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Choices.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

    <!-- Top Navbar -->
    <header class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm premium-header">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
                <i class="fa-solid fa-graduation-cap"></i>
                RecruitPro
            </a>
            <div class="d-flex align-items-center gap-3 text-white">
                <div class="profile-icon">
                    <img src="https://ui-avatars.com/api/?name=Admin+User&background=random" alt="Profile" class="rounded-circle" width="36" height="36">
                </div>
            </div>
        </div>
    </header>

    <div class="container-fluid main-layout">
        <div class="row flex-nowrap">
            <!-- Sidebar -->
            <div class="col-auto col-md-3 col-xl-2 px-sm-2 px-0 bg-white shadow-sm premium-sidebar">
                <div class="d-flex flex-column align-items-center align-items-sm-start px-3 pt-4 text-white min-vh-100">
                    <ul class="nav nav-pills flex-column mb-sm-auto mb-0 align-items-center align-items-sm-start w-100" id="menu">
                        <li class="nav-item w-100 mb-2">
                            <a href="#" class="nav-link align-middle px-3 py-2 active" id="nav-add-student" data-target="section-add-student">
                                <i class="fa-solid fa-user-plus fa-fw"></i> <span class="ms-1 d-none d-sm-inline fw-medium">Add Student</span>
                            </a>
                        </li>
                        <li class="nav-item w-100 mb-2">
                            <a href="#" class="nav-link align-middle px-3 py-2" id="nav-view-students" data-target="section-view-students">
                                <i class="fa-solid fa-users fa-fw"></i> <span class="ms-1 d-none d-sm-inline fw-medium">View Students</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Main Content Area -->
            <div class="col py-4 px-4 content-area position-relative">
                
                <!-- Toast Notification -->
                <div class="position-fixed top-0 end-0 p-3" style="z-index: 1080">
                    <div id="liveToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
                      <div class="d-flex">
                        <div class="toast-body" id="toast-message">
                          Success!
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                      </div>
                    </div>
                </div>

                <!-- SECTION 1: ADD STUDENT -->
                <section id="section-add-student" class="content-section active animate-fade-in">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="fw-bold m-0 text-dark">Add New Student</h2>
                    </div>
                    
                    <div class="card premium-card border-0 shadow-sm">
                        <div class="card-body p-4 p-md-5">
                            <form id="add-student-form">
                                <div class="row g-4">
                                    <div class="col-md-6">
                                        <label for="studentName" class="form-label fw-medium">Full Name</label>
                                        <div class="input-group premium-input-group">
                                            <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-regular fa-user"></i></span>
                                            <input type="text" class="form-control border-start-0 ps-0" id="studentName" placeholder="e.g. Zaheer R" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="studentEmail" class="form-label fw-medium">Email Address</label>
                                        <div class="input-group premium-input-group">
                                            <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-regular fa-envelope"></i></span>
                                            <input type="email" class="form-control border-start-0 ps-0" id="studentEmail" placeholder="zaheer@example.com" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="courseInterest" class="form-label fw-medium">Course Interest</label>
                                        <div class="input-group premium-input-group">
                                            <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-solid fa-laptop-code"></i></span>
                                            <select class="form-select border-start-0 ps-0" id="courseInterest" required>
                                                <option value="" disabled selected>Select a course</option>
                                                <option value="Frontend Development">Frontend Development</option>
                                                <option value="Backend Development">Backend Development</option>
                                                <option value="Fullstack Development">Fullstack Development</option>
                                                <option value="UI/UX Design">UI/UX Design</option>
                                                <option value="Data Science">Data Science</option>
                                                <option value="Flutter">Flutter</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="studentStatus" class="form-label fw-medium">Status</label>
                                        <div class="input-group premium-input-group">
                                            <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-solid fa-bars-progress"></i></span>
                                            <select class="form-select border-start-0 ps-0" id="studentStatus" required>
                                                <option value="New" selected>New</option>
                                                <option value="Contacted">Contacted</option>
                                                <option value="Enrolled">Enrolled</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-12 mt-5">
                                        <div class="d-flex justify-content-end gap-3">
                                            <button type="reset" class="btn btn-light px-4 py-2 fw-medium btn-hover-effect">Clear</button>
                                            <button type="submit" class="btn btn-primary px-4 py-2 fw-medium btn-hover-effect shadow-sm">Save Student</button>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </section>

                <!-- SECTION 2: VIEW STUDENTS -->
                <section id="section-view-students" class="content-section animate-fade-in" style="display: none;">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
                        <h2 class="fw-bold m-0 text-dark">Student Directory</h2>
                        
                        <div class="d-flex gap-3 align-items-center">
                            <div class="search-box position-relative">
                                <i class="fa-solid fa-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                                <input type="text" id="searchInput" class="form-control rounded-pill ps-5 premium-search" placeholder="Search students...">
                            </div>
                            
                            <select id="filterCourse" class="form-select rounded-pill premium-select w-auto">
                                <option value="All">All Courses</option>
                                <option value="Frontend Development">Frontend</option>
                                <option value="Backend Development">Backend</option>
                                <option value="Fullstack Development">Fullstack</option>
                                <option value="UI/UX Design">UI/UX</option>
                                <option value="Data Science">Data Science</option>
                                <option value="Flutter">Flutter</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="card premium-card border-0 shadow-sm overflow-hidden">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0 premium-table">
                                <thead class="table-light text-muted">
                                    <tr>
                                        <th scope="col" class="ps-4 py-3 font-weight-semibold">Name</th>
                                        <th scope="col" class="py-3 font-weight-semibold">Email</th>
                                        <th scope="col" class="py-3 font-weight-semibold">Course Interest</th>
                                        <th scope="col" class="py-3 font-weight-semibold">Status</th>
                                        <th scope="col" class="pe-4 py-3 text-end font-weight-semibold">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="studentsTableBody">
                                    <!-- Dynamic Content Here -->
                                </tbody>
                            </table>
                        </div>
                        
                        <!-- Empty State -->
                        <div id="emptyState" class="text-center py-5 d-none">
                            <div class="empty-icon-wrapper mb-3 mx-auto">
                                <i class="fa-regular fa-folder-open text-muted fa-2x"></i>
                            </div>
                            <h5 class="text-dark fw-bold mb-1">No students found</h5>
                            <p class="text-muted mb-0">Try adjusting your filters or add a new student.</p>
                        </div>
                    </div>
                </section>

            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Choices.js JS -->
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <!-- Custom Script -->
    <script src="script.js"></script>
</body>
</html>
